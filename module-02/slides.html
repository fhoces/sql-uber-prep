# The Four Flavors

| JOIN type | Returns |
|---|---|
| `INNER JOIN` (or `JOIN`) | Only rows matched in both tables |
| `LEFT JOIN` | All left rows; right rows where matched (NULL otherwise) |
| `RIGHT JOIN` | All right rows; left where matched (rarely used — flip and use LEFT) |
| `FULL OUTER JOIN` | All rows from both; NULLs where no match |

--

**The fifth pattern:** anti-join — "rows in A that have NO match in B". There's no `ANTI JOIN` keyword. You do it with `LEFT JOIN ... WHERE B.id IS NULL` or `NOT EXISTS`.

---

# Syntax

```sql
SELECT  r.ride_id, d.gender
FROM    rides AS r
JOIN    drivers AS d
  ON    r.driver_id = d.driver_id
WHERE   ...;
```

The `ON` clause specifies which column links the two tables — the same column you'd put in `by =` in dplyr's `left_join(rides, drivers, by = "driver_id")`.

--

Three things:

1. **Always use table aliases** (`r`, `d`, etc.). Shorter, and disambiguates columns that exist in both tables (like `driver_id`).
2. **`ON` is the join condition** — anything that evaluates TRUE/FALSE works, including non-equality.
3. **`USING (col)`** is shorthand for `ON r.col = d.col` when the column has the same name in both tables.

# Inner JOIN: Table 1

**rides** — we want the ride info. Notice the `driver_id` column:


```sql
SELECT ride_id, driver_id, fare_usd FROM rides LIMIT 5;
```




Table: 5 records

|ride_id | driver_id| fare_usd|
|:-------|---------:|--------:|
|1       |       429|    16.52|
|2       |        83|    19.78|
|3       |       535|    26.97|
|4       |       101|    13.68|
|5       |        85|    16.65|

We want to attach each driver's `gender` to their rides. But `gender` lives in a different table...

# Inner JOIN: Table 2

**drivers** — has the `gender` column, linked by the same `driver_id`:


```sql
SELECT driver_id, gender FROM drivers LIMIT 5;
```




Table: 5 records

|driver_id |gender |
|:---------|:------|
|1         |M      |
|2         |M      |
|3         |M      |
|4         |M      |
|5         |M      |

The `driver_id` column appears in **both** tables — that's the link. The JOIN will match rows where they agree.

# Inner JOIN: The Result


```sql
SELECT r.ride_id, r.driver_id, d.gender, r.fare_usd
FROM   rides r
JOIN   drivers d ON r.driver_id = d.driver_id
LIMIT 5;
```




Table: 5 records

|ride_id | driver_id|gender | fare_usd|
|:-------|---------:|:------|--------:|
|1       |       429|F      |    16.52|
|2       |        83|M      |    19.78|
|3       |       535|M      |    26.97|
|4       |       101|M      |    13.68|
|5       |        85|M      |    16.65|

--

Each ride now has the driver's `gender` attached. The `ON r.driver_id = d.driver_id` told SQL which rows to match — same as `inner_join(rides, drivers, by = "driver_id")` in dplyr.

Only rows where `driver_id` exists in **both** tables are kept.

# LEFT JOIN: Table 1

**requests** — all ride requests, including ones that were rejected:


```sql
SELECT request_id, rider_id, accepted FROM requests LIMIT 5;
```




Table: 5 records

|request_id | rider_id| accepted|
|:----------|--------:|--------:|
|1          |     3632|        1|
|2          |      912|        1|
|3          |     1119|        1|
|4          |     2529|        1|
|5          |        7|        1|

Some requests have `accepted = 0` — no ride was completed. What happens to those when we join?

---

# LEFT JOIN: Table 2

**rides** — only exists for requests that were actually accepted:


```sql
SELECT request_id, ride_id, fare_usd FROM rides LIMIT 5;
```




Table: 5 records

|request_id | ride_id| fare_usd|
|:----------|-------:|--------:|
|1          |       1|    16.52|
|2          |       2|    19.78|
|3          |       3|    26.97|
|4          |       4|    13.68|
|5          |       5|    16.65|

Rejected requests have **no matching row** in `rides`. A LEFT JOIN keeps them anyway (with NULLs for the missing ride columns).

---
count: false

# LEFT JOIN: The Result


```sql
SELECT req.request_id, req.accepted, r.fare_usd
FROM   requests req
LEFT JOIN rides r ON req.request_id = r.request_id
LIMIT 5;
```




Table: 5 records

|request_id | accepted| fare_usd|
|:----------|--------:|--------:|
|1          |        1|    16.52|
|2          |        1|    19.78|
|3          |        1|    26.97|
|4          |        1|    13.68|
|5          |        1|    16.65|

--

**All** requests are kept (LEFT side). If a request was not accepted, there's no matching ride → `fare_usd` is **NULL**.

This is the key difference from INNER JOIN: unmatched left-side rows stay in the result (with NULLs for the right side) instead of being dropped.

---

# Anti-Join: "Who has NO match?"

**The question:** which drivers have never completed a ride?

In dplyr: `anti_join(drivers, rides, by = "driver_id")` — one line, done.

--

SQL has **no `ANTI JOIN` keyword**. You fake it in two steps:

1. **LEFT JOIN** — keep all drivers; NULLs where no ride exists
2. **Filter for NULLs** — keep only the unmatched ones


```sql
SELECT d.driver_id, d.gender
FROM   drivers d
LEFT JOIN rides r ON d.driver_id = r.driver_id
WHERE  r.ride_id IS NULL
LIMIT 5;
```




Table: 0 records

| driver_id|gender |
|---------:|:------|

--

The `WHERE r.ride_id IS NULL` keeps only drivers whose LEFT JOIN produced no match — i.e., drivers with zero rides. That's the anti-join.

---

# Pattern: Multi-table chain

When the column you want lives several tables away, you **chain** joins. Here we want the city *name* (in `cities`) for each ride (in `rides`), but they're linked through `requests` → `neighborhoods` → `cities`.

.small[

```sql
SELECT c.name AS city,
       COUNT(*) AS n_rides,
       ROUND(AVG(r.fare_usd), 2) AS avg_fare
FROM   rides r
JOIN   requests req ON r.request_id = req.request_id
JOIN   neighborhoods n ON req.pickup_nbhd_id = n.nbhd_id
JOIN   cities c ON n.city_id = c.city_id
GROUP BY c.name
ORDER BY n_rides DESC;
```




Table: 5 records

|city          | n_rides| avg_fare|
|:-------------|-------:|--------:|
|Chicago       |    7946|    12.03|
|Boston        |    7906|    12.04|
|Austin        |    7780|    12.03|
|Seattle       |    7700|    11.94|
|San Francisco |    7668|    12.02|
]

# Pattern: Multi-table chain — reading the aliases

The single-letter aliases are shorthand for table names:

| Alias | Table | What it contributes |
|---|---|---|
| `r` | `rides` | fare, distance, timing |
| `req` | `requests` | links rides to pickup neighborhood |
| `n` | `neighborhoods` | links neighborhood to city |
| `c` | `cities` | the city name we want |

So `c.name` = "the `name` column from the `cities` table" — like `cities$name` in R.

&lt;details&gt;&lt;summary&gt;Click here to see the same query in R / dplyr&lt;/summary&gt;
&lt;pre&gt;
rides |&gt;
  left_join(requests, by = "request_id") |&gt;
  left_join(neighborhoods, by = c("pickup_nbhd_id" = "nbhd_id")) |&gt;
  left_join(cities, by = "city_id") |&gt;
  group_by(city = name) |&gt;
  summarise(n_rides = n(), avg_fare = round(mean(fare_usd), 2)) |&gt;
  arrange(desc(n_rides))
&lt;/pre&gt;
&lt;/details&gt;

# Common Traps

**1. Cartesian explosion.** Forget the `ON` clause and you get every row in A paired with every row in B. With 39k rides × 800 drivers = 31M rows. **Always check the join before running.**

--

**2. Inner join silently dropping rows.** If 5% of rides have a `driver_id` that doesn't exist in `drivers`, an inner join drops them silently. The honest pattern is LEFT JOIN + check for NULLs.

--

**3. Aggregating after a join.** Joining can multiply rows. Always check: one-to-one, one-to-many, or many-to-many?

--

**4. Filtering on the right side of a LEFT JOIN.** Putting `WHERE r.fare_usd &gt; 20` after a `LEFT JOIN rides r` silently turns it into an INNER JOIN — because it filters out the NULL rows. Put the filter in `ON` instead.

# Q1. Unique drivers per rider


```sql
SELECT req.rider_id,
       COUNT(DISTINCT r.driver_id) AS n_unique_drivers,
       COUNT(*)                    AS n_rides
FROM   rides r
JOIN   requests req ON r.request_id = req.request_id
GROUP BY req.rider_id
ORDER BY n_unique_drivers DESC
LIMIT 5;
```




Table: 5 records

| rider_id| n_unique_drivers| n_rides|
|--------:|----------------:|-------:|
|     2340|               23|      23|
|     1163|               21|      21|
|      854|               21|      21|
|      458|               21|      21|
|     3085|               20|      20|

# Q2. Each ride attached to driver tenure


```sql
SELECT r.ride_id,
       r.driver_id,
       date(r.started_at) AS ride_date,
       julianday(r.started_at) - julianday(d.signup_date) AS tenure_days
FROM   rides r
JOIN   drivers d ON r.driver_id = d.driver_id
ORDER BY r.ride_id
LIMIT 5;
```




Table: 5 records

|ride_id | driver_id|ride_date  | tenure_days|
|:-------|---------:|:----------|-----------:|
|1       |       429|2025-08-19 |     2441622|
|2       |        83|2025-08-19 |     2441808|
|3       |       535|2025-01-04 |     2440450|
|4       |       101|2025-08-05 |     2441560|
|5       |        85|2025-06-13 |     2441286|

# Q3. Rider-driver pairs with 3+ 5-star ratings


```sql
SELECT req.rider_id, r.driver_id, COUNT(*) AS n_5star
FROM   rides r
JOIN   requests req ON r.request_id = req.request_id
WHERE  r.rider_rating = 5
GROUP BY req.rider_id, r.driver_id
HAVING COUNT(*) &gt;= 3
ORDER BY n_5star DESC
LIMIT 5;
```

| rider_id| driver_id|n_5star |
|--------:|---------:|:-------|

# The Key Takeaways

&lt;br&gt;

### 1. INNER, LEFT, anti-join — you'll use these three constantly. RIGHT and FULL OUTER, almost never.

--

&lt;br&gt;

### 2. The most common bug: filtering the right side of a LEFT JOIN in WHERE. Always put it in ON.

--

&lt;br&gt;

### 3. Build multi-table joins one step at a time. Don't try to write 5-table joins from scratch.
