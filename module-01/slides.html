# What This Course Is

A 5-module SQL refresher targeted at **applied economist / data science** interviews in tech.

--

- **Database:** SQLite (`data/uber.sqlite`), built by `Rscript data/setup.R`
- **Schema:** rides, requests, drivers, riders, neighborhoods, cities
- **Format:** every module is concept → code → 3-5 interview-style questions
- **Goal:** be able to write the canonical analytical queries from a cold start

--

This module is the warm-up: SELECT, WHERE, simple aggregates, sorting, LIMIT.

---

# The Schema

A **schema** is the map of a database: what tables exist, what columns each has, and how they link. If you're used to R or Stata, think of it as having **multiple data frames stored together** with columns that let you `left_join` between them.

```
cities         (city_id, name, country, lead_pm)
neighborhoods  (nbhd_id, city_id, name, pct_minority, median_income)
drivers        (driver_id, signup_date, gender, home_nbhd_id)
riders         (rider_id, signup_date, home_nbhd_id)
requests       (request_id, rider_id, pickup_nbhd_id, dropoff_nbhd_id,
                requested_at, accepted, accepted_by_driver_id)
rides          (ride_id, request_id, driver_id, started_at, ended_at,
                distance_mi, fare_usd, surge_mult, rider_rating)
```

--

The linking columns (e.g. `driver_id` appears in both `rides` and `drivers`) are what you'd use as the `by =` argument in dplyr. In SQL, you use `JOIN ... ON` instead.

---

# The Core Syntax

```sql
SELECT col1, col2, agg_func(col3) AS result_name
FROM   table_name
WHERE  some_condition
GROUP BY col1, col2
HAVING aggregate_condition
ORDER BY col1 DESC
LIMIT 10;
```

--

**Logical execution order** (different from written order):

`FROM` → `WHERE` → `GROUP BY` → `HAVING` → `SELECT` → `ORDER BY` → `LIMIT`

--

A **column alias** is the name you give a computed result with `AS` — e.g., `fare_usd * 1.5 AS surge_fare`. It's like naming a new column in `mutate(surge_fare = fare_usd * 1.5)`.

This execution order matters: `WHERE` happens **before** SELECT, so you can't use an alias in `WHERE` (it doesn't exist yet). `ORDER BY` happens **after** SELECT, so you can.

---

# Five Things to Remember

**1. `COUNT(*)` vs `COUNT(col)`** — `COUNT(*)` counts rows; `COUNT(col)` skips NULLs in `col`.

--

**2. `COUNT(DISTINCT col)`** — the most common non-trivial aggregate.

--

**3. `AVG` and `SUM` ignore NULLs.** Usually what you want. If not, wrap in `COALESCE(col, 0)`.

--

**4. `WHERE` filters rows; `HAVING` filters groups.** No aggregates in `WHERE`.

--

**5. `LIMIT` is *not* a sample.** It's the first N rows after `ORDER BY`. Without sorting, the order is undefined.

---

# Date Handling in SQLite

```sql
date(col)                          -- '2025-01-15'
strftime('%Y-%m', col)             -- '2025-01'
strftime('%w', col)                -- day of week (0=Sun)
strftime('%H', col)                -- hour of day
date(col, 'start of month')        -- first of the month
date(col, '-7 days')               -- a week ago
julianday(b) - julianday(a)        -- day difference
```

--

In Postgres or MySQL the syntax is different (`DATE_TRUNC`, `EXTRACT`), but the patterns are the same. If your interviewer uses a different dialect, just ask.

---

# Pattern: Top-N


```sql
SELECT ride_id, driver_id, distance_mi, fare_usd
FROM   rides
ORDER BY distance_mi DESC
LIMIT 5;
```




Table: 5 records

| ride_id| driver_id| distance_mi| fare_usd|
|-------:|---------:|-----------:|--------:|
|   28699|       744|       36.82|    90.87|
|   11316|       157|       30.26|    73.29|
|   35411|       800|       29.30|    47.41|
|    5731|       468|       29.11|    45.44|
|     313|       532|       28.87|    65.01|

--

The two essentials: an `ORDER BY` and a `LIMIT`. Forget the `ORDER BY` and you'll get five arbitrary rows.

---

# Pattern: Filtered Aggregate


```sql
SELECT COUNT(*) AS rides_dec, AVG(fare_usd) AS avg_fare
FROM   rides
WHERE  date(started_at) BETWEEN '2025-12-01' AND '2025-12-31';
```




Table: 1 records

| rides_dec| avg_fare|
|---------:|--------:|
|      3293| 11.84622|

--

`WHERE` happens before aggregation, so this counts December rides and averages their fares.

---

# Pattern: Group By + Having

**Drivers with at least 100 rides in 2025**:


```sql
SELECT driver_id, COUNT(*) AS n_rides
FROM   rides
WHERE  date(started_at) BETWEEN '2025-01-01' AND '2025-12-31'
GROUP BY driver_id
HAVING COUNT(*) &gt;= 100
ORDER BY n_rides DESC
LIMIT 5;
```




Table: 0 records

| driver_id|n_rides |
|---------:|:-------|

--

**Don't put `COUNT(*) &gt;= 100` in `WHERE`** — aggregates don't exist there yet. `HAVING` is the post-aggregation filter.

---

# Pattern: Conditional Counts


```sql
SELECT
  COUNT(*) AS total,
  SUM(CASE WHEN accepted = 1 THEN 1 ELSE 0 END) AS accepted_count,
  ROUND(AVG(CASE WHEN accepted = 1 THEN 1.0 ELSE 0 END), 3) AS accept_rate
FROM requests;
```




Table: 1 records

| total| accepted_count| accept_rate|
|-----:|--------------:|-----------:|
| 50000|          39000|        0.78|

--

The `CASE WHEN ... THEN 1 ELSE 0 END` trick is the SQL version of `mean(x == "foo")` in R. **Memorize it** — you'll use it constantly.

---

# Common Traps

- **Integer division:** `SUM(x) / COUNT(*)` → 0 if both are integers and the result &lt; 1. Always cast: `1.0 * SUM(x) / COUNT(*)`

--

- **NULLs in `AVG`:** ignored, not zeroed. `AVG(fare_usd)` on 100 rows with 50 NULLs averages over the 50 non-NULL rows.

--

- **Column aliases in `WHERE`:** doesn't work. Repeat the expression or wrap in a subquery.

--

- **`BETWEEN` is inclusive on both ends.** `WHERE x BETWEEN 1 AND 10` is `x &gt;= 1 AND x &lt;= 10`.

--

- **Case-sensitive string comparison.** Use `LOWER()` or `COLLATE NOCASE`.

# Interview Questions
### How fast can you write each one?

---

# Q1. Average fare by hour of day


```sql
SELECT strftime('%H', started_at) AS hour,
       ROUND(AVG(fare_usd), 2)    AS avg_fare,
       COUNT(*)                   AS n_rides
FROM   rides
GROUP BY hour
ORDER BY hour
LIMIT 6;
```




Table: 1 records

|hour | avg_fare| n_rides|
|:----|--------:|-------:|
|00   |    12.01|   39000|

---

# Q2. Monthly conversion rate


```sql
SELECT strftime('%Y-%m', requested_at) AS month,
       COUNT(*)                         AS n_requests,
       SUM(accepted)                    AS n_accepted,
       ROUND(1.0 * SUM(accepted) / COUNT(*), 3) AS accept_rate
FROM   requests
GROUP BY month
ORDER BY month
LIMIT 6;
```




Table: 6 records

|month   | n_requests| n_accepted| accept_rate|
|:-------|----------:|----------:|-----------:|
|2025-01 |       4251|       3307|       0.778|
|2025-02 |       3818|       2970|       0.778|
|2025-03 |       4227|       3321|       0.786|
|2025-04 |       4109|       3195|       0.778|
|2025-05 |       4228|       3249|       0.768|
|2025-06 |       4199|       3311|       0.789|

---

# Q3. Surge frequency


```sql
SELECT
  COUNT(*) AS total_rides,
  SUM(CASE WHEN surge_mult &gt; 1.0 THEN 1 ELSE 0 END) AS surged_rides,
  ROUND(1.0 * SUM(CASE WHEN surge_mult &gt; 1.0 THEN 1 ELSE 0 END) / COUNT(*), 3)
    AS pct_surged,
  ROUND(AVG(surge_mult), 3) AS avg_surge_mult
FROM rides;
```




Table: 1 records

| total_rides| surged_rides| pct_surged| avg_surge_mult|
|-----------:|------------:|----------:|--------------:|
|       39000|        28949|      0.742|          1.246|
