# The Mental Model

A window function:

- Computes an aggregate (or rank, or lag) **across a set of rows related to the current row** (the "window")
- Returns **one value per input row** (unlike GROUP BY)
- Lives in the SELECT clause

--

```sql
SELECT
  driver_id, fare_usd,
  AVG(fare_usd) OVER (PARTITION BY driver_id) AS driver_avg
FROM rides;
```

Returns *every* ride along with its driver's average fare. **No GROUP BY, no subquery.**

---

# The OVER Clause

```sql
function() OVER (
  PARTITION BY col1, col2     -- groups (like GROUP BY)
  ORDER BY     col3 DESC      -- order within partition
  ROWS BETWEEN ... AND ...    -- frame
)
```

--

Three parts:

- **PARTITION BY** — splits rows into groups
- **ORDER BY** — orders within each partition (required for ranking; optional for plain aggregates)
- **ROWS BETWEEN** — defines the window frame

---

# Four Function Families

**1. Aggregates** — `SUM`, `AVG`, `MIN`, `MAX`, `COUNT`

--

**2. Ranking**

| Function | Behavior on ties |
|---|---|
| `ROW_NUMBER()` | Always 1, 2, 3, ... |
| `RANK()` | Same rank, gaps after (1, 2, 2, 4) |
| `DENSE_RANK()` | Same rank, no gaps (1, 2, 2, 3) |
| `NTILE(n)` | Splits into n equal buckets |

--

**3. Offset** — `LAG(col, n, default)`, `LEAD(col, n, default)`

--

**4. First / last** — `FIRST_VALUE`, `LAST_VALUE`, `NTH_VALUE`

---

# Pattern: Top-N Per Group


```sql
WITH ranked AS (
  SELECT driver_id, ride_id, fare_usd,
         ROW_NUMBER() OVER (PARTITION BY driver_id ORDER BY fare_usd DESC) AS rk
  FROM rides
)
SELECT driver_id, ride_id, fare_usd
FROM ranked
WHERE rk = 1
ORDER BY fare_usd DESC
LIMIT 5;
```




Table: 5 records

| driver_id| ride_id| fare_usd|
|---------:|-------:|--------:|
|       744|   28699|    90.87|
|       157|   11316|    73.29|
|       708|   20070|    65.67|
|       532|     313|    65.01|
|       664|   21337|    60.96|

--

**Use `ROW_NUMBER`** if you want exactly one row per group (ties broken arbitrarily). **Use `RANK` or `DENSE_RANK`** if you want all tied rows.

# Pattern: Time Since Previous Event


```sql
SELECT
  ride_id, driver_id, started_at,
  LAG(started_at, 1) OVER (PARTITION BY driver_id ORDER BY started_at) AS prev,
  ROUND(
    (julianday(started_at) -
     julianday(LAG(started_at, 1) OVER (PARTITION BY driver_id ORDER BY started_at))
    ) * 24, 2
  ) AS hours_since_last
FROM rides
LIMIT 5;
```




Table: 5 records

| ride_id| driver_id|started_at                 |prev                       | hours_since_last|
|-------:|---------:|:--------------------------|:--------------------------|----------------:|
|    6262|         1|2025-01-04 00:05:03.253056 |NA                         |               NA|
|    2840|         1|2025-01-06 00:03:46.348345 |2025-01-04 00:05:03.253056 |            47.98|
|    7704|         1|2025-01-12 00:04:46.916019 |2025-01-06 00:03:46.348345 |           144.02|
|   25133|         1|2025-01-14 00:02:28.86687  |2025-01-12 00:04:46.916019 |            47.96|
|    1303|         1|2025-02-03 00:04:51.056838 |2025-01-14 00:02:28.86687  |           480.04|

# Pattern: Rolling Average


```sql
WITH daily AS (
  SELECT date(started_at) AS day, COUNT(*) AS rides_today
  FROM rides
  GROUP BY day
)
SELECT day, rides_today,
       ROUND(AVG(rides_today) OVER (
         ORDER BY day
         ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
       ), 1) AS rolling_7d
FROM daily
ORDER BY day
LIMIT 7;
```




Table: 7 records

|day        | rides_today| rolling_7d|
|:----------|-----------:|----------:|
|2025-01-01 |         104|      104.0|
|2025-01-02 |          99|      101.5|
|2025-01-03 |         113|      105.3|
|2025-01-04 |         114|      107.5|
|2025-01-05 |         124|      110.8|
|2025-01-06 |         113|      111.2|
|2025-01-07 |         104|      110.1|

--

`ROWS BETWEEN 6 PRECEDING AND CURRENT ROW` = 7-row window. Pre-aggregate to one row per day so the row count = day count.

# Pattern: Bottom Decile per Group


```sql
WITH driver_city AS (
  SELECT r.driver_id, n.city_id,
         AVG(CASE WHEN req.accepted = 1 THEN 1.0 ELSE 0 END) AS accept_rate
  FROM requests req
  LEFT JOIN rides r ON req.request_id = r.request_id
  JOIN neighborhoods n ON req.pickup_nbhd_id = n.nbhd_id
  WHERE r.driver_id IS NOT NULL
  GROUP BY r.driver_id, n.city_id
),
deciled AS (
  SELECT *, NTILE(10) OVER (PARTITION BY city_id ORDER BY accept_rate) AS decile
  FROM driver_city
)
SELECT * FROM deciled WHERE decile = 1 LIMIT 5;
```




Table: 5 records

|driver_id | city_id| accept_rate| decile|
|:---------|-------:|-----------:|------:|
|1         |       1|           1|      1|
|2         |       1|           1|      1|
|3         |       1|           1|      1|
|4         |       1|           1|      1|
|5         |       1|           1|      1|

--

`NTILE(10)` is a one-liner replacement for the gnarly correlated subquery from Module 3.

# Pattern: Gaps and Islands

"Each driver's longest streak of consecutive days with ≥ 1 ride."

```sql
WITH driver_days AS (
  SELECT DISTINCT driver_id, date(started_at) AS d FROM rides
),
labeled AS (
  SELECT driver_id, d,
    julianday(d) - ROW_NUMBER() OVER (PARTITION BY driver_id ORDER BY d) AS grp
  FROM driver_days
),
streaks AS (
  SELECT driver_id, grp, COUNT(*) AS streak_len
  FROM labeled
  GROUP BY driver_id, grp
)
SELECT driver_id, MAX(streak_len) FROM streaks GROUP BY driver_id;
```

--

**The trick:** subtracting `ROW_NUMBER()` from the date gives a constant for any consecutive run. Group by that constant → each streak. Mind-bending the first time you see it.

---

# Common Traps

**1. Missing `ORDER BY` for ranking.** `ROW_NUMBER() OVER (PARTITION BY x)` without ORDER BY is non-deterministic.

--

**2. Wrong default frame for `LAST_VALUE`.** Defaults to ending at `CURRENT ROW`, so it returns the current row's value. Always extend to `UNBOUNDED FOLLOWING`.

--

**3. Window functions in `WHERE`.** Doesn't work — windows are computed after WHERE. Wrap in a CTE and filter in the outer query.

--

**4. Rolling window with gaps.** `ROWS BETWEEN 6 PRECEDING` counts *rows*, not days. Pre-aggregate first.

# The Key Takeaways

&lt;br&gt;

### 1. Window functions = aggregate + per-row output. The mental shift is: every row keeps its identity, but you compute things across related rows.

--

&lt;br&gt;

### 2. The four families: aggregate-with-window, ranking, offset (LAG/LEAD), first/last.

--

&lt;br&gt;

### 3. ROW_NUMBER + filter inside a CTE is the canonical "top-N per group" idiom. Memorize it.
