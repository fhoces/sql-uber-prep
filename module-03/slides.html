# Six Patterns to Memorize

1. **City-level dashboard** (one row per city, many metrics)
2. **Compare-to-global** (HAVING with a subquery)
3. **Conversion funnel** (CASE WHEN counts at each step)
4. **Per-group ranking** (correlated subquery; window function later)
5. **Cohort retention** (signup-month × activity-month)
6. **Bottom-N within group**

If you can write all six from memory, you're past the bar for any data job interview.

# How to Write SQL (for R Users)

In dplyr you write **top-to-bottom in the order things happen**: data → join → group → summarise → sort.

SQL's written order is **scrambled** — you write the output (`SELECT`) first, even though it runs last. This is confusing.

--

**Trick: write SQL from the middle out.**

| Step | What to write | Where it goes |
|---|---|---|
| 1. | `FROM rides r` | Middle |
| 2. | `JOIN requests req ON ...` | Middle |
| 3. | `GROUP BY c.name` | Below the joins |
| 4. | Now go to the top: `SELECT c.name, COUNT(*)` | Top |
| 5. | `ORDER BY ... LIMIT ...` | Bottom |

--

Start with the data source (FROM), add joins, add GROUP BY. **Only then** go back up and write SELECT — by that point you know what columns are available. Feels weird for a week, then it's automatic.

# Q: Build a city-level dashboard with rides, drivers, avg fare, and revenue.

&lt;a class="write-ref" href="#write-order"&gt;WO&lt;/a&gt;
**Step 1.** Start from the `rides` table — that's where fares live.

```sql
FROM rides r
```

--

**Step 2.** We need city names, but `rides` doesn't have them. Chain through 3 joins:

```sql
FROM rides r
JOIN requests req ON r.request_id = req.request_id     -- get pickup neighborhood
JOIN neighborhoods n ON req.pickup_nbhd_id = n.nbhd_id -- get city_id
JOIN cities c ON n.city_id = c.city_id                  -- get city name
```

--

**Step 3.** Now we have all the columns. Group by city, compute the aggregates:

```sql
SELECT c.name AS city,
       COUNT(DISTINCT r.driver_id) AS drivers,  -- unique drivers
       COUNT(*) AS n_rides,                      -- total rides
       ROUND(AVG(r.fare_usd), 2) AS avg_fare,   -- average fare
       ROUND(SUM(r.fare_usd), 0) AS revenue      -- total revenue
...
GROUP BY c.name ORDER BY revenue DESC;
```

# Q: City-level dashboard — the full query + result

&lt;a class="write-ref" href="#write-order"&gt;WO&lt;/a&gt;
.small[

```sql
SELECT c.name AS city, COUNT(DISTINCT r.driver_id) AS drivers,
       COUNT(*) AS n_rides, ROUND(AVG(r.fare_usd), 2) AS avg_fare,
       ROUND(SUM(r.fare_usd), 0) AS revenue
FROM rides r
JOIN requests req ON r.request_id = req.request_id
JOIN neighborhoods n ON req.pickup_nbhd_id = n.nbhd_id
JOIN cities c ON n.city_id = c.city_id
GROUP BY c.name ORDER BY revenue DESC;
```

# Q: Which cities have an average fare above the global average?

&lt;a class="write-ref" href="#write-order"&gt;WO&lt;/a&gt;
Let's build this step by step.

--

**Step 1.** What's the global average fare? A standalone query:

```sql
SELECT ROUND(AVG(fare_usd), 2) FROM rides;
-- returns a single number, e.g., 12.02
```

--

**Step 2.** Compute the average fare **per city** (same JOIN chain as Pattern 1):

```sql
SELECT c.name AS city, ROUND(AVG(r.fare_usd), 2) AS avg_fare
FROM rides r
JOIN requests req ON r.request_id = req.request_id
JOIN neighborhoods n ON req.pickup_nbhd_id = n.nbhd_id
JOIN cities c ON n.city_id = c.city_id
GROUP BY c.name;
```

---
count: false

# Q: Which cities have an average fare above the global average?

&lt;a class="write-ref" href="#write-order"&gt;WO&lt;/a&gt;
**Step 3.** Keep only cities whose avg fare beats the global avg. Paste Step 1's query inside `HAVING`:

```sql
HAVING AVG(r.fare_usd) &gt; (SELECT AVG(fare_usd) FROM rides)
```

The `(SELECT AVG(fare_usd) FROM rides)` is a **scalar subquery** — a mini-query that returns one number, used here like a constant.

Note it says `fare_usd`, not `r.fare_usd`. The subquery is **self-contained** — it has its own `FROM rides` and doesn't know about the outer query's `r` alias. It scans the whole table independently and returns one number.

# Q: Compare to global average — full query + result

&lt;a class="write-ref" href="#write-order"&gt;WO&lt;/a&gt;
.pull-left[
.small[
```sql
SELECT c.name AS city,
  ROUND(AVG(r.fare_usd), 2) AS avg_fare,
  (SELECT ROUND(AVG(fare_usd), 2)
   FROM rides) AS global_avg
FROM rides r
JOIN requests req
  ON r.request_id = req.request_id
JOIN neighborhoods n
  ON req.pickup_nbhd_id = n.nbhd_id
JOIN cities c
  ON n.city_id = c.city_id
GROUP BY c.name
HAVING AVG(r.fare_usd) &gt;
  (SELECT AVG(fare_usd) FROM rides)
ORDER BY avg_fare DESC;
```
]
]

.pull-right[

Table: 4 records

|city          | avg_fare| global_avg|
|:-------------|--------:|----------:|
|Boston        |    12.04|      12.01|
|Chicago       |    12.03|      12.01|
|Austin        |    12.03|      12.01|
|San Francisco |    12.02|      12.01|

Only cities with `avg_fare &gt; global_avg` survive the `HAVING` filter.

# Pattern 3: Build a funnel — how many requests become rides, and how many of those get 5 stars?

&lt;a class="write-ref" href="#write-order"&gt;WO&lt;/a&gt;
--


```sql
SELECT
  COUNT(*)                                                AS step1_requests,
  SUM(CASE WHEN req.accepted = 1 THEN 1 ELSE 0 END)       AS step2_accepted,
  SUM(CASE WHEN r.ride_id IS NOT NULL THEN 1 ELSE 0 END)  AS step3_completed,
  SUM(CASE WHEN r.rider_rating = 5 THEN 1 ELSE 0 END)     AS step4_5star,
  ROUND(1.0 * SUM(CASE WHEN r.rider_rating = 5 THEN 1 ELSE 0 END) /
        COUNT(*), 3) AS overall_conv
FROM requests req
LEFT JOIN rides r ON req.request_id = r.request_id;
```




Table: 1 records

| step1_requests| step2_accepted| step3_completed| step4_5star| overall_conv|
|--------------:|--------------:|---------------:|-----------:|------------:|
|          50000|          39000|           39000|       23536|        0.471|

--

The pattern: `SUM(CASE WHEN ... THEN 1 ELSE 0 END)` counts qualifying rows at each step. Divide to get conversion rates.

# Pattern 4: For each signup-month cohort, how many riders were active in each subsequent month?

&lt;a class="write-ref" href="#write-order"&gt;WO&lt;/a&gt;
--


```sql
WITH cohort AS (
  SELECT rider_id, strftime('%Y-%m', signup_date) AS cohort_month
  FROM   riders
),
activity AS (
  SELECT DISTINCT rider_id, strftime('%Y-%m', requested_at) AS activity_month
  FROM   requests
)
SELECT c.cohort_month,
       a.activity_month,
       COUNT(DISTINCT c.rider_id) AS active_riders
FROM   cohort c
JOIN   activity a ON c.rider_id = a.rider_id
GROUP BY c.cohort_month, a.activity_month
ORDER BY c.cohort_month, a.activity_month
LIMIT 6;
```




Table: 6 records

|cohort_month |activity_month | active_riders|
|:------------|:--------------|-------------:|
|2022-01      |2025-01        |            63|
|2022-01      |2025-02        |            59|
|2022-01      |2025-03        |            57|
|2022-01      |2025-04        |            55|
|2022-01      |2025-05        |            65|
|2022-01      |2025-06        |            56|

# Common Traps

**1. Selecting non-aggregated columns without grouping.** Strict SQL errors out; SQLite picks an arbitrary value (which is worse).

--

**2. `COUNT` vs `COUNT(DISTINCT)`.** `COUNT(*)` counts rows. `COUNT(DISTINCT col)` counts unique values. Always be deliberate.

--

**3. Counting "users" after a JOIN.** Joins multiply rows. `COUNT(rider_id)` after a join counts *rides*, not riders. Use `COUNT(DISTINCT rider_id)`.

--

**4. Filtering aggregates in `WHERE`.** Doesn't work. Use `HAVING`.

# The Key Takeaways

&lt;br&gt;

### 1. The six patterns above cover almost every analytical query you'll write.

--

&lt;br&gt;

### 2. WHERE filters rows; HAVING filters groups. Aggregates can only live in HAVING.

--

&lt;br&gt;

### 3. CASE WHEN inside an aggregate is the SQL idiom for `mean(condition)`. Memorize it.
